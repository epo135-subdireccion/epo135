<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Funciones Cuadráticas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
        }
        .controles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3748;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e2e8f0;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4299e1;
            cursor: pointer;
        }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
        }
        .valor {
            font-weight: bold;
            color: #4299e1;
            font-size: 18px;
            margin-top: 5px;
        }
        .grafico-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        canvas {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
        }
        .info {
            background: #edf2f7;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .ecuacion {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
            text-align: center;
            margin-bottom: 15px;
        }
        .vertice, .raices {
            font-size: 18px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .grafico-container {
                flex-direction: column;
            }
            canvas {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Simulador Interactivo de Funciones Cuadráticas</h1>
        
        <div class="controles">
            <div class="control-group">
                <label for="a">Coeficiente <strong>a</strong> (forma de la parábola):</label>
                <input type="range" id="a" min="-5" max="5" step="0.1" value="1">
                <input type="number" id="a-num" min="-5" max="5" step="0.1" value="1">
                <div class="valor" id="a-valor">a = 1.0</div>
            </div>
            
            <div class="control-group">
                <label for="b">Coeficiente <strong>b</strong> (asimetría):</label>
                <input type="range" id="b" min="-20" max="20" step="0.5" value="0">
                <input type="number" id="b-num" min="-20" max="20" step="0.5" value="0">
                <div class="valor" id="b-valor">b = 0.0</div>
            </div>
            
            <div class="control-group">
                <label for="c">Coeficiente <strong>c</strong> (intersección Y):</label>
                <input type="range" id="c" min="-50" max="100" step="1" value="0">
                <input type="number" id="c-num" min="-50" max="100" step="1" value="0">
                <div class="valor" id="c-valor">c = 0.0</div>
            </div>
        </div>

        <div class="ecuacion" id="ecuacion">f(x) = ax² + bx + c</div>

        <div class="grafico-container">
            <canvas id="graficoCompleto" width="600" height="400"></canvas>
            <canvas id="graficoRango" width="400" height="400"></canvas>
        </div>

        <div class="info">
            <div class="vertice">
                <strong>🏔️ Vértice:</strong> <span id="vertice">(-b/(2a), f(-b/(2a)))</span>
            </div>
            <div class="raices">
                <strong>🌱 Raíces:</strong> <span id="raices">x₁, x₂ (o "No reales")</span>
            </div>
            <div style="margin-top: 15px; font-size: 16px;">
                <strong>📏 Dominio:</strong> [-100, 100] | <strong>📐 Rango visible:</strong> [0, 100]
            </div>
        </div>
    </div>

    <script>
        // Elementos del DOM
        const aSlider = document.getElementById('a');
        const bSlider = document.getElementById('b');
        const cSlider = document.getElementById('c');
        const aNum = document.getElementById('a-num');
        const bNum = document.getElementById('b-num');
        const cNum = document.getElementById('c-num');
        
        const canvasCompleto = document.getElementById('graficoCompleto');
        const ctxCompleto = canvasCompleto.getContext('2d');
        const canvasRango = document.getElementById('graficoRango');
        const ctxRango = canvasRango.getContext('2d');

        // Configuración del gráfico
        const DOMINIO = { MIN: -100, MAX: 100 };
        const RANGO_Y = { MIN: 0, MAX: 100 };
        const ESCALA_PX = 4; // píxeles por unidad

        // Sincronización sliders/números
        function sincronizar(a, b, c) {
            aSlider.value = a;
            bSlider.value = b;
            cSlider.value = c;
            aNum.value = a;
            bNum.value = b;
            cNum.value = c;
        }

        // Listeners para sliders y números
        [aSlider, aNum].forEach(el => el.addEventListener('input', () => actualizar()));
        [bSlider, bNum].forEach(el => el.addEventListener('input', () => actualizar()));
        [cSlider, cNum].forEach(el => el.addEventListener('input', () => actualizar()));

        function actualizar() {
            const a = parseFloat(aSlider.value);
            const b = parseFloat(bSlider.value);
            const c = parseFloat(cSlider.value);
            
            // Actualizar valores mostrados
            document.getElementById('a-valor').textContent = `a = ${a.toFixed(2)}`;
            document.getElementById('b-valor').textContent = `b = ${b.toFixed(2)}`;
            document.getElementById('c-valor').textContent = `c = ${c.toFixed(2)}`;
            
            // Actualizar ecuación
            document.getElementById('ecuacion').textContent = 
                `f(x) = ${a >= 0 ? '' : ''}${a.toFixed(2)}x² ${b >= 0 ? '+' : ''}${b.toFixed(2)}x ${c >= 0 ? '+' : ''}${c.toFixed(2)}`;
            
            // Calcular vértice y raíces
            const xVertice = -b / (2 * a);
            const yVertice = evaluar(a, b, c, xVertice);
            document.getElementById('vertice').textContent = 
                `(${xVertice.toFixed(2)}, ${yVertice.toFixed(2)})`;
            
            // Calcular raíces
            const discriminante = b * b - 4 * a * c;
            let raicesText = discriminante >= 0 ? 
                `x₁ = ${((-b + Math.sqrt(discriminante)) / (2*a)).toFixed(2)}, ` +
                `x₂ = ${((-b - Math.sqrt(discriminante)) / (2*a)).toFixed(2)}` :
                "No reales (Δ < 0)";
            document.getElementById('raices').textContent = raicesText;
            
            // Redibujar gráficos
            dibujarGraficoCompleto(a, b, c);
            dibujarGraficoRango(a, b, c);
            
            sincronizar(a, b, c);
        }

        function evaluar(a, b, c, x) {
            return a * x * x + b * x + c;
        }

        function dibujarGraficoCompleto(a, b, c) {
            const ctx = ctxCompleto;
            const width = canvasCompleto.width;
            const height = canvasCompleto.height;
            
            // Limpiar
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            // Ejes
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(width/2, 0);
            ctx.lineTo(width/2, height);
            ctx.moveTo(0, height/2);
            ctx.lineTo(width, height/2);
            ctx.stroke();
            
            // Escala Y dinámica para gráfico completo
            const yMin = Math.min(0, evaluar(a, b, c, DOMINIO.MIN), evaluar(a, b, c, DOMINIO.MAX));
            const yMax = Math.max(evaluar(a, b, c, DOMINIO.MIN), evaluar(a, b, c, DOMINIO.MAX));
            const escalaY = height / (yMax - yMin) * 0.9;
            const offsetY = height/2 - yMin * escalaY;
            
            // Dibujar parábola
            ctx.strokeStyle = '#e53e3e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for(let px = 0; px <= width; px++) {
                const x = (px - width/2) / ESCALA_PX + DOMINIO.MIN;
                const y = evaluar(a, b, c, x);
                const py = height/2 - (y * escalaY);
                if(px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            
            // Vértice
            const xVertice = -b/(2*a);
            const pxVertice = (xVertice - DOMINIO.MIN) * ESCALA_PX + width/2;
            const pyVertice = height/2 - evaluar(a,b,c,xVertice) * escalaY;
            ctx.fillStyle = '#4299e1';
            ctx.beginPath();
            ctx.arc(pxVertice, pyVertice, 6, 0, 2*Math.PI);
            ctx.fill();
        }

        function dibujarGraficoRango(a, b, c) {
            const ctx = ctxRango;
            const width = canvasRango.width;
            const height = canvasRango.height;
            
            // Limpiar y dibujar área de rango
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            // Área de rango [0,100]
            ctx.fillStyle = 'rgba(72, 187, 120, 0.1)';
            ctx.fillRect(0, 0, width, height * (100 - RANGO_Y.MIN) / (RANGO_Y.MAX - RANGO_Y.MIN));
            
            // Ejes
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(width/2, 0);
            ctx.lineTo(width/2, height);
            ctx.moveTo(0, height - 20); // Línea Y=0
            ctx.lineTo(width, height - 20);
            ctx.stroke();
            
            // Escala para rango [0,100]
            const escalaY = (height - 40) / (RANGO_Y.MAX - RANGO_Y.MIN);
            const offsetY = 20;
            
            // Dibujar parábola (solo donde esté en rango)
            ctx.strokeStyle = '#e53e3e';
            ctx.lineWidth = 4;
            ctx.beginPath();
            let primerPunto = true;
            for(let px = 0; px <= width; px++) {
                const x = (px / width * 40 - 20); // Ventana [-20,20] para mejor visualización
                const y = evaluar(a, b, c, x);
                if(y >= RANGO_Y.MIN && y <= RANGO_Y.MAX) {
                    const py = height - (y - RANGO_Y.MIN) * escalaY - offsetY;
                    if(primerPunto) {
                        ctx.moveTo(px, py);
                        primerPunto = false;
                    } else {
                        ctx.lineTo(px, py);
                    }
                } else {
                    primerPunto = true;
                }
            }
            ctx.stroke();
            
            // Etiquetas
            ctx.fillStyle = '#2d3748';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Dominio [-20, 20]', width/2, height - 5);
            ctx.fillText('Rango [0, 100]', width/2, 18);
        }

        // Inicializar
        actualizar();
    </script>
</body>
</html>
