<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Titulación Ácido-Base</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        input { padding: 8px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .resultados { background: #e8f4fd; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .status { font-weight: bold; font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Simulador de Titulación Ácido-Base</h1>
        
        <div class="controls">
            <div>
                <label>Volumen ácido inicial (mL): <input type="number" id="Va" value="25.0" step="0.1" min="10" max="100"></label>
            </div>
            <div>
                <label>Conc. ácido (M): <input type="number" id="Ca" value="0.100" step="0.001" min="0.01" max="1.0"></label>
            </div>
            <div>
                <label>Conc. base (M): <input type="number" id="Cb" value="0.100" step="0.001" min="0.01" max="1.0"></label>
            </div>
            <div>
                <label>Volumen base (mL): <input type="range" id="Vb" value="0" min="0" max="50" step="0.1" oninput="updateSimulacion()">
                <span id="VbValor">0.0 mL</span></label>
            </div>
        </div>

        <div style="display: flex; gap: 30px;">
            <!-- Matraz -->
            <div style="flex: 1;">
                <h3>Matraz de titulación</h3>
                <div id="matraz" style="width: 300px; height: 400px; border: 3px solid #333; border-radius: 0 0 50% 50%; 
                     position: relative; background: linear-gradient(to bottom, #e0f7fa 0%, #b2ebf2 100%); margin: 0 auto;">
                    <div id="nivel" style="position: absolute; bottom: 0; left: 0; width: 100%; 
                         background: linear-gradient(to right, #ffeb3b 0%, #ffc107 50%, #ff9800 100%); transition: height 0.3s;">
                    </div>
                    <div id="indicador" style="position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
                         font-size: 24px; font-weight: bold; transition: all 0.5s;"></div>
                </div>
                <div class="status" id="estado"></div>
                <div class="resultados">
                    <p><strong>pH actual:</strong> <span id="pH">7.00</span></p>
                    <p><strong>Vol. total:</strong> <span id="Vtotal">25.0 mL</span></p>
                    <p><strong>mmol ácido:</strong> <span id="mmolA">2.50</span></p>
                    <p><strong>mmol base:</strong> <span id="mmolB">0.00</span></p>
                </div>
            </div>

            <!-- Gráfica -->
            <div style="flex: 2;">
                <h3>Curva de titulación</h3>
                <div id="grafica" style="width: 100%; height: 400px;"></div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="reiniciar()">🔄 Reiniciar</button>
            <button onclick="titularPuntoEquivalencia()">⚗️ Punto de equivalencia</button>
            <button onclick="autoTitular()">▶️ Titulación automática</button>
        </div>
    </div>

    <script>
        let trace1 = {}, trace2 = {};
        
        function calcularQuimica(Va, Ca, Cb, Vb) {
            const Va_total = Va + Vb;
            const na = Ca * Va / 1000;  // mmol ácido inicial
            const nb = Cb * Vb / 1000;  // mmol base añadida
            
            let pH;
            
            if (Vb === 0) {
                // Solo ácido débil
                const Ka = 1.8e-5;
                const alpha = Math.sqrt(Ka / Ca);
                pH = -Math.log10(alpha);
            } else if (nb < na) {
                // Antes del punto de equivalencia (exceso ácido)
                const C_acido_restante = (na - nb) / Va_total * 1000;
                const Ka = 1.8e-5;
                const alpha = Math.sqrt(Ka / C_acido_restante);
                pH = -Math.log10(alpha);
            } else if (nb === na) {
                // Punto de equivalencia (sal básica)
                const C_sal = na / Va_total * 1000;
                const Kb = 1e-14 / 1.8e-5;
                const alpha = Math.sqrt(Kb / C_sal);
                pH = 14 + Math.log10(alpha);
            } else {
                // Después del punto de equivalencia (exceso base fuerte)
                const OH_exceso = (nb - na) / Va_total * 1000;
                pH = 14 + Math.log10(OH_exceso);
            }
            
            const estado = nb < na ? 'Exceso de ácido' : 
                          nb === na ? 'Punto de equivalencia' : 'Exceso de base';
            const color = nb < na ? 'amarillo' : nb === na ? 'magenta' : 'violeta';
            
            return {
                pH: pH.toFixed(2),
                Vtotal: Va_total.toFixed(1),
                mmolA: (na - Math.min(na, nb)).toFixed(2),
                mmolB: (nb - na).toFixed(2),
                estado: estado,
                color: color,
                nivel: Math.min(100, (Va_total / 75) * 100)
            };
        }

        function updateSimulacion() {
            const Va = parseFloat(document.getElementById('Va').value);
            const Ca = parseFloat(document.getElementById('Ca').value);
            const Cb = parseFloat(document.getElementById('Cb').value);
            const Vb = parseFloat(document.getElementById('Vb').value);
            
            document.getElementById('VbValor').textContent = Vb.toFixed(1) + ' mL';
            
            const resultado = calcularQuimica(Va, Ca, Cb, Vb);
            
            // Actualizar matraz
            document.getElementById('nivel').style.height = resultado.nivel + '%';
            document.getElementById('indicador').textContent = resultado.color;
            document.getElementById('indicador').style.color = resultado.color;
            
            // Actualizar datos
            document.getElementById('pH').textContent = resultado.pH;
            document.getElementById('Vtotal').textContent = resultado.Vtotal + ' mL';
            document.getElementById('mmolA').textContent = resultado.mmolA;
            document.getElementById('mmolB').textContent = resultado.mmolB;
            document.getElementById('estado').textContent = resultado.estado;
            document.getElementById('estado').style.color = resultado.color;
            
            // Actualizar gráfica
            actualizarGrafica(Va, Ca, Cb);
        }

        function actualizarGrafica(Va, Ca, Cb) {
            const Vb_max = Va * Ca / Cb * 1.2;
            const Vb_puntos = Array.from({length: 500}, (_, i) => i * Vb_max / 499);
            const pH_puntos = Vb_puntos.map(Vb => calcularQuimica(Va, Ca, Cb, Vb).pH);
            
            const layout = {
                title: { text: 'Curva de Titulación CH₃COOH vs NaOH', font: {size: 16} },
                xaxis: { title: 'Volumen NaOH añadido (mL)' },
                yaxis: { title: 'pH', range: [2, 12] },
                showlegend: false,
                plot_bgcolor: '#f8f9fa',
                paper_bgcolor: 'white'
            };
            
            Plotly.newPlot('grafica', [{
                x: Vb_puntos,
                y: pH_puntos,
                type: 'scatter',
                mode: 'lines',
                line: { color: '#007bff', width: 3 }
            }, {
                x: [parseFloat(document.getElementById('Vb').value)],
                y: [parseFloat(document.getElementById('pH').textContent)],
                type: 'scatter',
                mode: 'markers',
                marker: { color: 'red', size: 12, symbol: 'circle-open' }
            }], layout, {responsive: true});
        }

        function reiniciar() {
            document.getElementById('Va').value = '25.0';
            document.getElementById('Ca').value = '0.100';
            document.getElementById('Cb').value = '0.100';
            document.getElementById('Vb').value = '0';
            updateSimulacion();
        }

        function titularPuntoEquivalencia() {
            const Va = parseFloat(document.getElementById('Va').value);
            const Ca = parseFloat(document.getElementById('Ca').value);
            const Cb = parseFloat(document.getElementById('Cb').value);
            const Vb_eq = (Va * Ca / Cb).toFixed(1);
            document.getElementById('Vb').value = Vb_eq;
            updateSimulacion();
        }

        function autoTitular() {
            let Vb = 0;
            const interval = setInterval(() => {
                Vb += 0.5;
                document.getElementById('Vb').value = Vb;
                updateSimulacion();
                if (Vb >= 30) clearInterval(interval);
            }, 100);
        }

        // Inicializar
        updateSimulacion();
    </script>
</body>
</html>
