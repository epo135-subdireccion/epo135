<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual · EPO 135</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #0f5e2f;
    --verde-med: #1a7a3f;
    --verde-claro: #2ea84f;
    --azul: #0d3b6e;
    --dorado: #c8860a;
    --gris-fondo: #f5f7f6;
    --gris-borde: #d8e2dc;
    --texto: #0f1f17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--gris-fondo);
    color: var(--texto);
    min-height: 100vh;
  }

  header {
    background: var(--verde);
    color: white;
    padding: 2rem 2rem 1.5rem;
    border-bottom: 4px solid var(--dorado);
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.75;
    margin-top: 0.25rem;
    font-family: 'DM Mono', monospace;
  }

  .contenedor {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .buscador {
    background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 8px rgba(15,94,47,0.06);
  }

  .buscador label {
    display: block;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--verde);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .input-wrap {
    display: flex;
    gap: 0.5rem;
  }

  .buscador input {
    flex: 1;
    padding: 0.65rem 1rem;
    border: 1.5px solid var(--gris-borde);
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .buscador input:focus { border-color: var(--verde-claro); }

  .btn-buscar {
    background: var(--verde);
    color: white;
    border: none;
    padding: 0.65rem 1.4rem;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-buscar:hover { background: var(--verde-med); }

  .ayuda {
    margin-top: 0.75rem;
    font-size: 0.78rem;
    color: #666;
    font-family: 'DM Mono', monospace;
  }

  .ayuda span {
    background: #eef5f0;
    color: var(--verde);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-right: 0.3rem;
  }

  .filtros {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .filtro-btn {
    background: white;
    border: 1.5px solid var(--gris-borde);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--texto);
  }

  .filtro-btn:hover, .filtro-btn.activo {
    background: var(--verde);
    color: white;
    border-color: var(--verde);
  }

  .resultados-info {
    font-size: 0.82rem;
    color: #666;
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
    padding-left: 0.25rem;
  }

  .libro {
    background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    box-shadow: 0 1px 4px rgba(15,94,47,0.04);
    transition: box-shadow 0.2s, border-color 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .libro:hover {
    box-shadow: 0 4px 16px rgba(15,94,47,0.1);
    border-color: var(--verde-claro);
  }

  .libro-icono {
    font-size: 2rem;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 0.1rem;
  }

  .libro-info { flex: 1; }

  .libro-titulo {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--azul);
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }

  .libro-autor {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 0.4rem;
  }

  .libro-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    background: #eef5f0;
    color: var(--verde);
    border: 1px solid #c8dfd0;
  }

  .tag.año { background: #fdf3e3; color: #a06010; border-color: #f0d090; }

  .libro-accion {
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--verde-claro);
    flex-shrink: 0;
    align-self: center;
    white-space: nowrap;
  }

  .sin-resultados {
    text-align: center;
    padding: 3rem 1rem;
    color: #888;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.1rem;
  }

  mark {
    background: #fff3b0;
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .libro { flex-direction: column; gap: 0.5rem; }
    .libro-accion { align-self: flex-start; }
    .input-wrap { flex-direction: column; }
    .btn-buscar { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 Biblioteca Virtual</h1>
  <p>Escuela Preparatoria Oficial Núm. 135 · Río Frío de Juárez</p>
</header>

<div class="contenedor">

  <div class="buscador">
    <label>Búsqueda de recursos</label>
    <div class="input-wrap">
      <input type="text" id="campo" placeholder='Ej: cálculo AND Franco, comunicación OR financiera, NOT SEP' autocomplete="off">
      <button class="btn-buscar" onclick="buscar()">Buscar</button>
    </div>
    <div class="ayuda">
      Operadores: <span>AND</span> ambas palabras · <span>OR</span> cualquiera · <span>NOT</span> excluir
    </div>
  </div>

  <div class="filtros">
    <button class="filtro-btn activo" onclick="filtrarCategoria('', this)">Todos</button>
    <button class="filtro-btn" onclick="filtrarCategoria('cálculo', this)">Cálculo</button>
    <button class="filtro-btn" onclick="filtrarCategoria('comunicación', this)">Comunicación</button>
    <button class="filtro-btn" onclick="filtrarCategoria('financiera', this)">Financiera</button>
  </div>

  <div class="resultados-info" id="info">Mostrando todos los recursos</div>
  <div id="lista"></div>

</div>

<script>
const BASE = 'https://epo135-subdireccion.github.io/epo135/';

const libros = [
  {
    titulo: 'Introducción al Cálculo',
    autor: 'Franco, J.',
    categoria: 'cálculo',
    año: '',
    ruta: 'biblioteca/calculo/FrancoJ-Introduccion-al-calculo.pdf',
    icono: '📐',
    palabras: 'calculo introduccion franco matematicas'
  },
  {
    titulo: 'Cálculo Integral I',
    autor: 'Mora, V. · SEP',
    categoria: 'cálculo',
    año: '2000',
    ruta: 'biblioteca/calculo/MoraV.SEP(2000)Cálculo Integral I.pdf',
    icono: '📐',
    palabras: 'calculo integral mora sep matematicas'
  },
  {
    titulo: 'Ciencias de la Comunicación 1',
    autor: 'Navarro, D.',
    categoria: 'comunicación',
    año: '',
    ruta: 'biblioteca/comunicacion/NavarroD-Ciencias-de-la-comunicacion-1.pdf',
    icono: '📡',
    palabras: 'comunicacion ciencias navarro lenguaje medios'
  },
  {
    titulo: 'Administración Financiera',
    autor: 'Barragán, G.',
    categoria: 'financiera',
    año: '',
    ruta: 'biblioteca/financiera/BarraganG-Administracion-financiera.pdf',
    icono: '💰',
    palabras: 'administracion financiera barragan economia contabilidad'
  }
];

let categoriaActiva = '';

function normalizar(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function tokenizar(texto) {
  return normalizar(texto).split(/\s+/).filter(Boolean);
}

function coincide(libro, termino) {
  const haystack = normalizar(
    libro.titulo + ' ' + libro.autor + ' ' + libro.categoria + ' ' + libro.año + ' ' + libro.palabras
  );
  return haystack.includes(normalizar(termino));
}

function evaluarBooleano(libro, query) {
  // Soporta: AND, OR, NOT (en mayúsculas como operadores)
  // Ejemplo: "calculo AND NOT SEP", "comunicacion OR financiera"
  
  // Dividir por OR primero (menor precedencia)
  if (/\bOR\b/.test(query)) {
    const partes = query.split(/\bOR\b/);
    return partes.some(p => evaluarBooleano(libro, p.trim()));
  }

  // Dividir por AND
  if (/\bAND\b/.test(query)) {
    const partes = query.split(/\bAND\b/);
    return partes.every(p => evaluarBooleano(libro, p.trim()));
  }

  // NOT
  if (/^NOT\s+/i.test(query)) {
    const termino = query.replace(/^NOT\s+/i, '').trim();
    return !coincide(libro, termino);
  }

  // Término simple
  return coincide(libro, query.trim());
}

function resaltar(texto, query) {
  // Extraer palabras no operadoras para resaltar
  const palabras = query.split(/\b(AND|OR|NOT)\b/i)
    .map(p => p.trim())
    .filter(p => p && !['AND','OR','NOT'].includes(p.toUpperCase()) && p.length > 1);
  
  let resultado = texto;
  palabras.forEach(p => {
    const re = new RegExp(`(${p})`, 'gi');
    resultado = resultado.replace(re, '<mark>$1</mark>');
  });
  return resultado;
}

function renderizar(items, query) {
  const lista = document.getElementById('lista');
  const info = document.getElementById('info');

  if (items.length === 0) {
    lista.innerHTML = '<div class="sin-resultados">No se encontraron recursos con esos criterios.</div>';
    info.textContent = 'Sin resultados';
    return;
  }

  info.textContent = `${items.length} recurso${items.length > 1 ? 's' : ''} encontrado${items.length > 1 ? 's' : ''}`;

  lista.innerHTML = items.map(libro => {
    const titulo = query ? resaltar(libro.titulo, query) : libro.titulo;
    const autor = query ? resaltar(libro.autor, query) : libro.autor;
    return `
      <a class="libro" href="${BASE}${libro.ruta}" target="_blank" rel="noopener">
        <div class="libro-icono">${libro.icono}</div>
        <div class="libro-info">
          <div class="libro-titulo">${titulo}</div>
          <div class="libro-autor">${autor}</div>
          <div class="libro-meta">
            <span class="tag">${libro.categoria}</span>
            ${libro.año ? `<span class="tag año">${libro.año}</span>` : ''}
          </div>
        </div>
        <div class="libro-accion">Ver PDF →</div>
      </a>`;
  }).join('');
}

function buscar() {
  const query = document.getElementById('campo').value.trim();

  let items = libros;

  if (categoriaActiva) {
    items = items.filter(l => l.categoria === categoriaActiva);
  }

  if (query) {
    items = items.filter(l => evaluarBooleano(l, query));
  }

  renderizar(items, query);
}

function filtrarCategoria(cat, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  categoriaActiva = cat;
  buscar();
}

// Enter para buscar
document.getElementById('campo').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});

// Carga inicial
renderizar(libros, '');
</script>
</body>
</html>
