<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual · EPO 135</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #0f5e2f; --verde-med: #1a7a3f; --verde-claro: #2ea84f;
    --azul: #0d3b6e; --dorado: #c8860a; --rojo: #c0392b; --morado: #5c3a9e;
    --gris-fondo: #f5f7f6; --gris-borde: #d8e2dc; --texto: #0f1f17;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--gris-fondo); color: var(--texto); min-height: 100vh; }

  header {
    background: var(--verde); color: white;
    padding: 1.75rem 2rem 1.25rem;
    border-bottom: 4px solid var(--dorado);
  }
  header h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.7rem; letter-spacing: -0.02em; }
  header p { font-size: 0.8rem; opacity: 0.7; margin-top: 0.2rem; font-family: 'DM Mono', monospace; }

  .contenedor { max-width: 900px; margin: 0 auto; padding: 1.75rem 1.5rem; }

  .panel {
    background: white; border: 1px solid var(--gris-borde);
    border-radius: 12px; padding: 1.1rem 1.4rem;
    margin-bottom: 0.9rem;
    box-shadow: 0 2px 8px rgba(15,94,47,0.06);
  }
  .panel-titulo {
    font-size: 0.7rem; font-family: 'DM Mono', monospace;
    color: var(--verde); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 0.7rem;
  }

  .input-wrap { display: flex; gap: 0.5rem; }
  .input-wrap input {
    flex: 1; padding: 0.6rem 1rem;
    border: 1.5px solid var(--gris-borde); border-radius: 6px;
    font-family: 'Outfit', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--verde-claro); }
  .btn {
    background: var(--verde); color: white; border: none;
    padding: 0.6rem 1.3rem; border-radius: 6px;
    font-family: 'Outfit', sans-serif; font-size: 0.9rem;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .btn:hover { background: var(--verde-med); }
  .btn.sec {
    background: white; color: #666;
    border: 1.5px solid var(--gris-borde); padding: 0.5rem 0.9rem;
    font-size: 0.82rem;
  }
  .btn.sec:hover { border-color: #aaa; color: var(--texto); }

  .ayuda { margin-top: 0.6rem; font-size: 0.74rem; color: #777; font-family: 'DM Mono', monospace; }
  .ayuda span { background: #eef5f0; color: var(--verde); padding: 0.1rem 0.35rem; border-radius: 3px; margin-right: 0.25rem; }

  .fecha-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .fecha-row label { font-size: 0.8rem; color: #555; white-space: nowrap; }
  .fecha-row input[type=number] {
    width: 82px; padding: 0.45rem 0.6rem;
    border: 1.5px solid var(--gris-borde); border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  .fecha-row input[type=number]:focus { border-color: var(--verde-claro); }
  .sep { color: #bbb; }

  .etiquetas-wrap { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .etiq-btn {
    border-radius: 20px; padding: 0.25rem 0.75rem;
    font-size: 0.75rem; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.15s;
    border: 1.5px solid; background: white;
  }
  .etiq-btn[data-color="verde"]  { color: var(--verde);  border-color: #b0d8b8; }
  .etiq-btn[data-color="azul"]   { color: var(--azul);   border-color: #a8c0dc; }
  .etiq-btn[data-color="dorado"] { color: var(--dorado); border-color: #e0c070; }
  .etiq-btn[data-color="morado"] { color: var(--morado); border-color: #c8b0e0; }
  .etiq-btn[data-color="rojo"]   { color: var(--rojo);   border-color: #e0a8a8; }
  .etiq-btn.activo[data-color="verde"]  { background: var(--verde);  color: white; border-color: var(--verde); }
  .etiq-btn.activo[data-color="azul"]   { background: var(--azul);   color: white; border-color: var(--azul); }
  .etiq-btn.activo[data-color="dorado"] { background: var(--dorado); color: white; border-color: var(--dorado); }
  .etiq-btn.activo[data-color="morado"] { background: var(--morado); color: white; border-color: var(--morado); }
  .etiq-btn.activo[data-color="rojo"]   { background: var(--rojo);   color: white; border-color: var(--rojo); }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; flex-wrap: wrap; gap: 0.5rem; }
  .resultados-info { font-size: 0.79rem; color: #666; font-family: 'DM Mono', monospace; }
  .ordenar { display: flex; gap: 0.35rem; align-items: center; }
  .ord-lbl { font-size: 0.73rem; color: #999; font-family: 'DM Mono', monospace; margin-right: 0.1rem; }
  .ord-btn {
    font-size: 0.73rem; font-family: 'DM Mono', monospace;
    padding: 0.22rem 0.6rem; border-radius: 4px;
    border: 1.5px solid var(--gris-borde); background: white;
    cursor: pointer; color: #555; transition: all 0.15s;
  }
  .ord-btn.activo { background: var(--azul); color: white; border-color: var(--azul); }

  .libro {
    background: white; border: 1px solid var(--gris-borde);
    border-radius: 10px; padding: 1.05rem 1.35rem;
    margin-bottom: 0.6rem;
    display: flex; align-items: flex-start; gap: 1rem;
    box-shadow: 0 1px 4px rgba(15,94,47,0.04);
    transition: box-shadow 0.2s, border-color 0.2s;
    text-decoration: none; color: inherit;
  }
  .libro:hover { box-shadow: 0 4px 16px rgba(15,94,47,0.1); border-color: var(--verde-claro); }
  .libro-icono { font-size: 1.85rem; flex-shrink: 0; line-height: 1; padding-top: 0.1rem; }
  .libro-info { flex: 1; min-width: 0; }
  .libro-titulo { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; color: var(--azul); margin-bottom: 0.18rem; line-height: 1.3; }
  .libro-autor { font-size: 0.82rem; color: #555; margin-bottom: 0.42rem; }
  .libro-meta { display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }

  .tag { font-size: 0.68rem; font-family: 'DM Mono', monospace; padding: 0.11rem 0.42rem; border-radius: 3px; border: 1px solid; }
  .tag.cat    { background: #eef5f0; color: var(--verde);  border-color: #c8dfd0; }
  .tag.año    { background: #fdf3e3; color: #a06010;       border-color: #f0d090; }
  .tag.e-verde  { background: #eef5f0; color: var(--verde);  border-color: #b0d8b8; }
  .tag.e-azul   { background: #e8f0f8; color: var(--azul);   border-color: #a8c0dc; }
  .tag.e-dorado { background: #fdf3e3; color: var(--dorado); border-color: #e0c070; }
  .tag.e-morado { background: #f3eef8; color: var(--morado); border-color: #c8b0e0; }
  .tag.e-rojo   { background: #fdecea; color: var(--rojo);   border-color: #e0a8a8; }

  .libro-accion { font-size: 0.77rem; font-family: 'DM Mono', monospace; color: var(--verde-claro); flex-shrink: 0; align-self: center; }
  .sin-resultados { text-align: center; padding: 3rem 1rem; color: #999; font-family: 'Fraunces', serif; font-style: italic; font-size: 1.05rem; }
  mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.35rem; }
    .libro { flex-direction: column; gap: 0.4rem; }
    .libro-accion { align-self: flex-start; }
    .input-wrap { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
    .fecha-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 Biblioteca Virtual</h1>
  <p>Escuela Preparatoria Oficial Núm. 135 · Río Frío de Juárez</p>
</header>

<div class="contenedor">

  <div class="panel">
    <div class="panel-titulo">Búsqueda booleana</div>
    <div class="input-wrap">
      <input type="text" id="campo" placeholder='Ej: cálculo AND Franco · comunicación OR financiera · NOT SEP' autocomplete="off">
      <button class="btn" onclick="aplicar()">Buscar</button>
      <button class="btn sec" onclick="limpiar()" title="Limpiar filtros">✕</button>
    </div>
    <div class="ayuda">Operadores: <span>AND</span> ambas · <span>OR</span> cualquiera · <span>NOT</span> excluir</div>
  </div>

  <div class="panel">
    <div class="panel-titulo">Rango de año de publicación</div>
    <div class="fecha-row">
      <label>Desde</label>
      <input type="number" id="anio-desde" placeholder="1990" min="1900" max="2099">
      <span class="sep">—</span>
      <label>Hasta</label>
      <input type="number" id="anio-hasta" placeholder="2026" min="1900" max="2099">
      <button class="btn sec" onclick="aplicar()">Aplicar</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-titulo">Etiquetas <span style="font-size:0.62rem;color:#bbb;font-family:'DM Mono',monospace">(selección múltiple · AND)</span></div>
    <div class="etiquetas-wrap" id="etiquetas-panel"></div>
  </div>

  <div class="toolbar">
    <div class="resultados-info" id="info">Mostrando todos los recursos</div>
    <div class="ordenar">
      <span class="ord-lbl">Ordenar:</span>
      <button class="ord-btn activo" onclick="ordenar('titulo',this)">A–Z</button>
      <button class="ord-btn" onclick="ordenar('año',this)">Año</button>
      <button class="ord-btn" onclick="ordenar('categoria',this)">Categoría</button>
    </div>
  </div>

  <div id="lista"></div>
</div>

<script>
const BASE = 'https://epo135-subdireccion.github.io/epo135/';

// ── DATOS ──────────────────────────────────────────────────────────────────
// Para agregar un libro: copia un bloque { ... } y ajusta los campos.
// año: número entero, o null si se desconoce.
// etiquetas: array; usa las definidas en ETIQUETAS o agrega nuevas ahí.
const libros = [
  {
    titulo: 'Introducción al Cálculo',
    autor: 'Franco, J.',
    categoria: 'cálculo',
    año: null,
    ruta: 'biblioteca/calculo/FrancoJ-Introduccion-al-calculo.pdf',
    icono: '📐',
    palabras: 'calculo introduccion franco matematicas limite derivada',
    etiquetas: ['matemáticas', '1er semestre', 'SEP recomendado']
  },
  {
    titulo: 'Cálculo Integral I',
    autor: 'Mora, V. · SEP',
    categoria: 'cálculo',
    año: 2000,
    ruta: 'biblioteca/calculo/MoraV.SEP(2000)Cálculo Integral I.pdf',
    icono: '📐',
    palabras: 'calculo integral mora sep matematicas area volumen',
    etiquetas: ['matemáticas', 'SEP recomendado']
  },
  {
    titulo: 'Ciencias de la Comunicación 1',
    autor: 'Navarro, D.',
    categoria: 'comunicación',
    año: null,
    ruta: 'biblioteca/comunicacion/NavarroD-Ciencias-de-la-comunicacion-1.pdf',
    icono: '📡',
    palabras: 'comunicacion ciencias navarro lenguaje medios periodismo',
    etiquetas: ['humanidades', '1er semestre']
  },
  {
    titulo: 'Administración Financiera',
    autor: 'Barragán, G.',
    categoria: 'financiera',
    año: null,
    ruta: 'biblioteca/financiera/BarraganG-Administracion-financiera.pdf',
    icono: '💰',
    palabras: 'administracion financiera barragan economia contabilidad presupuesto',
    etiquetas: ['economía', '3er semestre']
  }
];

// Catálogo de etiquetas → color
const ETIQUETAS = {
  'matemáticas':     'verde',
  'humanidades':     'azul',
  'economía':        'dorado',
  'SEP recomendado': 'morado',
  '1er semestre':    'rojo',
  '3er semestre':    'rojo'
};

// ── ESTADO ─────────────────────────────────────────────────────────────────
let etiquetasActivas = new Set();
let ordenActivo = 'titulo';

// ── INIT ───────────────────────────────────────────────────────────────────
(function init() {
  const panel = document.getElementById('etiquetas-panel');
  Object.entries(ETIQUETAS).forEach(([etiq, color]) => {
    const btn = document.createElement('button');
    btn.className = 'etiq-btn';
    btn.dataset.color = color;
    btn.textContent = etiq;
    btn.onclick = () => {
      etiquetasActivas.has(etiq) ? etiquetasActivas.delete(etiq) : etiquetasActivas.add(etiq);
      btn.classList.toggle('activo');
      aplicar();
    };
    panel.appendChild(btn);
  });
  ['campo','anio-desde','anio-hasta'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') aplicar(); });
  });
  renderizar(libros, '');
})();

function limpiar() {
  ['campo','anio-desde','anio-hasta'].forEach(id => document.getElementById(id).value = '');
  etiquetasActivas.clear();
  document.querySelectorAll('.etiq-btn').forEach(b => b.classList.remove('activo'));
  aplicar();
}

function ordenar(clave, btn) {
  ordenActivo = clave;
  document.querySelectorAll('.ord-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  aplicar();
}

function aplicar() {
  const query = document.getElementById('campo').value.trim();
  const desde = parseInt(document.getElementById('anio-desde').value) || null;
  const hasta = parseInt(document.getElementById('anio-hasta').value) || null;

  let items = [...libros];
  if (query)           items = items.filter(l => evaluarBooleano(l, query));
  if (desde !== null)  items = items.filter(l => l.año !== null && l.año >= desde);
  if (hasta !== null)  items = items.filter(l => l.año !== null && l.año <= hasta);
  if (etiquetasActivas.size > 0)
    items = items.filter(l => [...etiquetasActivas].every(e => l.etiquetas.includes(e)));

  items.sort((a, b) => {
    if (ordenActivo === 'año') {
      if (a.año === b.año) return 0;
      if (a.año === null) return 1;
      if (b.año === null) return -1;
      return a.año - b.año;
    }
    if (ordenActivo === 'categoria') return a.categoria.localeCompare(b.categoria, 'es');
    return norm(a.titulo).localeCompare(norm(b.titulo), 'es');
  });

  renderizar(items, query);
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function norm(s) { return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function coincide(libro, t) {
  const hay = norm([libro.titulo, libro.autor, libro.categoria, libro.año, libro.palabras, ...libro.etiquetas].join(' '));
  return hay.includes(norm(t));
}

function evaluarBooleano(libro, q) {
  if (/\bOR\b/.test(q))  return q.split(/\bOR\b/).some(p => evaluarBooleano(libro, p.trim()));
  if (/\bAND\b/.test(q)) return q.split(/\bAND\b/).every(p => evaluarBooleano(libro, p.trim()));
  if (/^NOT\s+/i.test(q)) return !coincide(libro, q.replace(/^NOT\s+/i,'').trim());
  return coincide(libro, q.trim());
}

function resaltar(texto, query) {
  if (!query) return texto;
  const pals = query.split(/\b(AND|OR|NOT)\b/i)
    .map(p => p.trim())
    .filter(p => p && !['AND','OR','NOT'].includes(p.toUpperCase()) && p.length > 1);
  let r = texto;
  pals.forEach(p => { r = r.replace(new RegExp(`(${p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>'); });
  return r;
}

function renderizar(items, query) {
  const lista = document.getElementById('lista');
  const info  = document.getElementById('info');

  if (!items.length) {
    lista.innerHTML = '<div class="sin-resultados">No se encontraron recursos con esos criterios.</div>';
    info.textContent = 'Sin resultados';
    return;
  }

  info.textContent = `${items.length} recurso${items.length !== 1 ? 's' : ''} encontrado${items.length !== 1 ? 's' : ''}`;

  lista.innerHTML = items.map(libro => {
    const etiqsHTML = libro.etiquetas.map(e => {
      const c = ETIQUETAS[e] || 'verde';
      return `<span class="tag e-${c}">${e}</span>`;
    }).join('');

    return `
      <a class="libro" href="${BASE}${libro.ruta}" target="_blank" rel="noopener">
        <div class="libro-icono">${libro.icono}</div>
        <div class="libro-info">
          <div class="libro-titulo">${resaltar(libro.titulo, query)}</div>
          <div class="libro-autor">${resaltar(libro.autor, query)}</div>
          <div class="libro-meta">
            <span class="tag cat">${libro.categoria}</span>
            ${libro.año ? `<span class="tag año">${libro.año}</span>` : ''}
            ${etiqsHTML}
          </div>
        </div>
        <div class="libro-accion">Ver PDF →</div>
      </a>`;
  }).join('');
}
</script>
</body>
</html>
